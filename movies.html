<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinetech | Films</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body data-list-type="movie">
    <header>
      <div class="container">
        <div class="search-autocomplete">
          <input
            type="text"
            name="site_search[q]"
            class="header-search-input"
            placeholder="Rechercher un film, une série, une star..."
            autocomplete="off"
            aria-label="Recherche"
            aria-autocomplete="list"
            aria-controls="search-suggestion-list"
            aria-expanded="false"
          />
          <button
            class="header-search-submit"
            type="submit"
            title="Rechercher"
            aria-label="Envoyer"
          >
            <i class="fa fa-search"></i>
          </button>
          <ul
            class="search-suggestions"
            id="search-suggestion-list"
            role="listbox"
            aria-label="Suggestions de recherche"
          ></ul>
        </div>
      </div>
      <nav>
        <a href="./index.html"
          ><strong><span class="title">Cinetech</span></strong></a
        >
        <div class="links">
          <a href="./index.html">Accueil</a>
          <a href="./movies.html">Films</a>
          <a href="./series.html">Séries</a>
        </div>
      </nav>
    </header>
    <main>
      <section class="page-intro">
        <h1>Films</h1>
        <p>Explorez tous les films disponibles .</p>
      </section>
      <section class="list-controls">
        <div>
          <h2>Films populaires</h2>
        </div>
        <div class="pagination" id="pagination"></div>
      </section>
      <section class="cards-grid" id="list-grid"></section>
    </main>
    <script src="./config/config.js"></script>
    <script src="./index.js"></script>
    <script src="./list.js"></script>
  </body>
</html>
