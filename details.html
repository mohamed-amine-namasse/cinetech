<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinetech | Détail</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="search-autocomplete">
          <input
            type="text"
            name="site_search[q]"
            class="header-search-input"
            placeholder="Rechercher un film, une série..."
            autocomplete="off"
            aria-label="Recherche"
            aria-autocomplete="list"
            aria-controls="search-suggestion-list"
            aria-expanded="false"
          />
          <button
            class="header-search-submit"
            type="submit"
            title="Rechercher"
            aria-label="Envoyer"
          >
            <i class="fa fa-search"></i>
          </button>
          <ul
            class="search-suggestions"
            id="search-suggestion-list"
            role="listbox"
            aria-label="Suggestions de recherche"
          ></ul>
        </div>
        <button type="button" class="btn btn-login" tabindex="-1">
          Se connecter
        </button>
      </div>
      <nav>
        <a href="./index.html"
          ><strong><span class="title">Cinetech</span></strong></a
        >
        <div class="links">
          <a href="./index.html">Accueil</a>
          <a href="./movies.html">Films</a>
          <a href="./series.html">Séries</a>
        </div>
      </nav>
    </header>
    <main>
      <section class="detail-page">
        <div class="detail-grid">
          <div class="detail-poster" id="detail-poster"></div>
          <div class="detail-info">
            <p class="detail-kind" id="detail-kind"></p>
            <h1 id="detail-title"></h1>
            <p class="detail-subtitle" id="detail-subtitle"></p>
            <div class="info-tags" id="detail-tags"></div>
            <p class="detail-overview" id="detail-overview"></p>
            <div class="detail-extra" id="detail-extra"></div>
          </div>
        </div>
      </section>

      <section class="detail-cast">
        <h2>Acteurs principaux</h2>
        <div class="cast-list" id="cast-list"></div>
      </section>

      <section class="similar-section">
        <div class="section-header">
          <h2>Commentaires</h2>
        </div>
        <div id="local-comment-form"></div>

        <div id="all-reviews-container"></div>
      </section>

      <section class="similar-section">
        <div class="section-header">
          <h2>Suggéré pour vous</h2>
        </div>
        <div class="similar-grid" id="similar-grid"></div>
      </section>
    </main>

    <script src="./config/config.js"></script>
    <script src="./auth.js"></script>
    <script src="./index.js"></script>
    <script src="./details.js"></script>
  </body>
</html>
