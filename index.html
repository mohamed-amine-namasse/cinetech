<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinetech | Accueil</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <!--<script src="./index.js" defer></script>-->
  </head>
  <body>
    <header>
      <div class="container">
        <div class="search-autocomplete">
          <input
            type="text"
            name="site_search[q]"
            class="header-search-input"
            placeholder="Rechercher un film, une série, une star..."
            autocomplete="off"
            aria-label="Recherche"
            aria-autocomplete="list"
            aria-controls="search-suggestion-list"
            aria-expanded="false"
          />
          <button
            class="header-search-submit"
            type="submit"
            title="Rechercher"
            aria-label="Envoyer"
          >
            <i class="fa fa-search"></i>
          </button>
          <ul
            class="search-suggestions"
            id="search-suggestion-list"
            role="listbox"
            aria-label="Suggestions de recherche"
          ></ul>
        </div>
      </div>

      <nav>
        <a href="#top"
          ><strong><span class="title">Cinetech</span></strong></a
        >

        <div class="links">
          <a href="./index.html"> Accueil </a>
          <a href="#films"> Films </a>
          <a href="#series"> Séries </a>
        </div>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h1>Découvrez les meilleures recettes</h1>
        <p>Cuisinez avec passion, partagez avec amour.</p>
      </section>
    </main>
    <script src="./index.js" defer></script>
  </body>
</html>
