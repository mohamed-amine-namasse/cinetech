<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinetech | Accueil</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="search-autocomplete">
          <input
            type="text"
            name="site_search[q]"
            class="header-search-input"
            placeholder="Rechercher un film, une série..."
            autocomplete="off"
            aria-label="Recherche"
            aria-autocomplete="list"
            aria-controls="search-suggestion-list"
            aria-expanded="false"
          />
          <button
            class="header-search-submit"
            type="submit"
            title="Rechercher"
            aria-label="Envoyer"
          >
            <i class="fa fa-search"></i>
          </button>
          <ul
            class="search-suggestions"
            id="search-suggestion-list"
            role="listbox"
            aria-label="Suggestions de recherche"
          ></ul>
        </div>
        <button type="button" class="btn btn-login" tabindex="-1">
          Se connecter
        </button>
      </div>

      <nav>
        <a href="./index.html"
          ><strong><span class="title">Cinetech</span></strong></a
        >

        <div class="links">
          <a href="./index.html"> Accueil </a>
          <a href="./movies.html"> Films </a>
          <a href="./series.html"> Séries </a>
          <a href="./favorites.html" id="nav-favorites" >Favoris</a>
    </header>
    <main>
      <section class="hero swiper hero-swiper">
        <div class="swiper-wrapper" id="hero-wrapper"></div>

        <div class="hero-content">
          <h1 id="main">Bienvenue sur Cinetech</h1>
          <p>
            Une sélection de films et de séries pour vos prochaines soirées.
          </p>
          <div class="hero-actions">
            <a class="btn" href="movies.html">Tous les films</a>
            <a class="btn btn-outline" href="series.html">Toutes les séries</a>
          </div>
        </div>

        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>

        <div class="swiper-pagination"></div>
      </section>

      <section id="films" class="section-selection">
        <div class="section-header">
          <h2>Sélection de films</h2>
          <a href="movies.html">Voir plus</a>
        </div>
        <div class="cards-grid"></div>
      </section>

      <section id="series" class="section-selection">
        <div class="section-header">
          <h2>Sélection de séries</h2>
          <a href="series.html">Voir plus</a>
        </div>
        <div class="cards-grid"></div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="./config/config.js"></script>
    <script src="./auth.js"></script>
    <script src="./index.js"></script>
    <script src="./list.js"></script>
    
  </body>
</html>
